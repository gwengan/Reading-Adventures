<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reading Adventures</title>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;600;700&family=Nunito:wght@400;600;700;800&family=Bangers&family=Atkinson+Hyperlegible:ital,wght@0,400;0,700&display=swap" rel="stylesheet">
<style>
@font-face {
  font-family: 'OpenDyslexic';
  src: url('https://cdn.jsdelivr.net/gh/antijingoist/opendyslexic@master/compiled/OpenDyslexic-Regular.woff2') format('woff2'),
       url('https://cdn.jsdelivr.net/gh/antijingoist/opendyslexic@master/compiled/OpenDyslexic-Regular.otf') format('opentype');
  font-weight: normal;
  font-style: normal;
}

:root {
  --ocean:#1565a8;--ocean-mid:#1976d2;--ocean-light:#42a5f5;
  --leaf:#2e7d32;--leaf-light:#66bb6a;
  --coral:#d32f2f;--amber:#f9a825;
  --correct:#2e7d32;--wrong:#c62828;
  --hl-vocab:#fff176;--hl-comp:#b3e5fc;--hl-infer:#ffe0b2;
  --bg:#f0f4f8;--page-bg:#ffffff;--card:#ffffff;--card2:#e8f0fe;
  --text:#1a1a2e;--text-dim:#4a5568;--border:#c5d0e0;
  --radius:12px;
  --font-body:'Lexend',sans-serif;
  --font-size:15px;
  --line-height:1.7;
}
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:var(--font-body);
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
  font-size:var(--font-size);
  line-height:var(--line-height);
}
h1,h2,h3,h4{font-style:normal;}
p,span,div,li,button,label,select,option{font-style:normal;}

/* ---- SCREENS ---- */
.screen{display:none;} .screen.active{display:block;}

/* ---- BUTTONS ---- */
.btn{
  font-family:var(--font-body);font-weight:700;font-size:0.92rem;
  padding:10px 20px;border-radius:50px;border:none;cursor:pointer;
  transition:all 0.18s ease;display:inline-flex;align-items:center;gap:8px;
  text-align:left;
}
.btn:hover{transform:translateY(-2px);filter:brightness(0.92);}
.btn:active{transform:translateY(0);}
.btn-primary{background:var(--ocean-mid);color:#fff;}
.btn-leaf{background:var(--leaf);color:#fff;}
.btn-coral{background:var(--coral);color:#fff;}
.btn-ghost{background:transparent;color:var(--text-dim);border:2px solid var(--border);}
.btn-sand{background:#e0d0a0;color:#2a1a00;}
.btn-amber{background:var(--amber);color:#1a0a00;}
.btn-sm{padding:7px 16px;font-size:0.85rem;}
.btn-xs{padding:4px 12px;font-size:0.8rem;border-radius:20px;}

/* TTS BUTTONS — clearly styled, won't trigger choice selection */
.tts-btn{
  background:#e3f2fd;border:2px solid var(--ocean-mid);
  color:var(--ocean-mid);border-radius:20px;padding:5px 12px;
  font-size:0.82rem;cursor:pointer;font-family:var(--font-body);
  font-weight:700;transition:all 0.15s;white-space:nowrap;
  display:inline-flex;align-items:center;gap:5px;flex-shrink:0;
  user-select:none;
}
.tts-btn:hover{background:#bbdefb;}
.tts-btn.speaking{background:var(--ocean-mid);color:#fff;}

/* ---- HOME ---- */
#home-screen{padding:20px 16px;max-width:960px;margin:0 auto;}
.home-header{text-align:left;padding:24px 0 16px;}
.home-header h1{
  font-family:'Bangers',cursive;font-size:clamp(2rem,5vw,3.2rem);
  letter-spacing:2px;color:var(--ocean-mid);margin-bottom:6px;
}
.home-header p{color:var(--text-dim);font-size:1rem;}
.home-controls{display:flex;gap:10px;flex-wrap:wrap;margin:14px 0 20px;}
.passages-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(148px,1fr));gap:12px;}
.pcard{
  background:var(--card);border:2px solid var(--border);border-radius:var(--radius);
  padding:14px 12px;cursor:pointer;transition:all 0.2s;text-align:left;position:relative;
  box-shadow:0 1px 4px rgba(0,0,0,0.08);
}
.pcard:hover{border-color:var(--ocean-mid);transform:translateY(-3px);box-shadow:0 6px 18px rgba(0,0,0,0.13);}
.pcard.done{border-color:var(--leaf);background:#f1f8f2;}
.pcard.done::after{content:'✓';position:absolute;top:8px;right:10px;color:var(--leaf);font-weight:900;font-size:1rem;}
.pcard-num{font-family:'Bangers',cursive;font-size:1.5rem;color:var(--ocean-mid);letter-spacing:1px;}
.pcard-emoji{font-size:1.3rem;margin:3px 0;}
.pcard-title{font-size:0.78rem;color:var(--text-dim);font-weight:700;line-height:1.3;}
.pcard-score{font-size:0.72rem;color:var(--leaf);font-weight:800;margin-top:4px;}

/* ---- READING SCREEN ---- */
#reading-screen{max-width:1020px;margin:0 auto;padding:14px 16px;}
.reading-layout{display:grid;grid-template-columns:1fr 1fr;gap:20px;align-items:start;}
@media(max-width:720px){.reading-layout{grid-template-columns:1fr;}}

/* PER-PASSAGE SETTINGS BAR */
.passage-settings{
  background:#fff;border:1.5px solid var(--border);border-radius:var(--radius);
  padding:12px 16px;margin-bottom:14px;
  display:flex;gap:16px;flex-wrap:wrap;align-items:center;
  box-shadow:0 1px 4px rgba(0,0,0,0.06);
}
.passage-settings label{color:var(--text-dim);font-size:0.85rem;font-weight:700;display:flex;align-items:center;gap:8px;}
.passage-settings select{
  font-family:var(--font-body);font-size:0.85rem;padding:4px 8px;
  border:1.5px solid var(--border);border-radius:8px;background:#fff;color:var(--text);
  cursor:pointer;
}
.passage-settings input[type=range]{accent-color:var(--ocean-mid);width:80px;cursor:pointer;}
.passage-settings .speed-label{font-weight:800;color:var(--ocean-mid);min-width:34px;font-size:0.85rem;}
.spacing-btn{
  background:#e3f2fd;border:1.5px solid var(--border);color:var(--text);
  border-radius:8px;padding:4px 10px;font-size:0.82rem;font-weight:700;
  cursor:pointer;font-family:var(--font-body);transition:all 0.15s;
}
.spacing-btn.active{border-color:var(--ocean-mid);background:var(--ocean-mid);color:#fff;}

/* PASSAGE PANEL */
.passage-panel{
  background:#fff;border:1.5px solid var(--border);border-radius:var(--radius);
  padding:20px;box-shadow:0 1px 4px rgba(0,0,0,0.07);
}
.passage-header{margin-bottom:12px;}
.passage-num-badge{
  display:inline-block;background:var(--ocean-mid);color:#fff;
  border-radius:8px;padding:3px 10px;font-size:0.8rem;font-weight:800;margin-bottom:6px;
}
.passage-title{font-family:'Bangers',cursive;font-size:1.4rem;letter-spacing:1px;color:var(--ocean-mid);}
.passage-controls{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px;align-items:center;}

.passage-body{
  line-height:var(--line-height);font-size:var(--font-size);
  color:var(--text);text-align:left;
}
.passage-body p{margin-bottom:1em;}
.passage-body .word{
  cursor:pointer;border-radius:3px;padding:0 1px;
  transition:background 0.1s;display:inline;
}
.passage-body .word:hover{background:rgba(25,118,210,0.1);}
.word.hl-vocab{background:var(--hl-vocab);border-radius:3px;}
.word.hl-comp{background:var(--hl-comp);border-radius:3px;}
.word.hl-infer{background:var(--hl-infer);border-radius:3px;}
.word.reading-hl{background:var(--ocean-mid) !important;color:#fff !important;border-radius:3px;}

.hl-legend{display:none;gap:10px;flex-wrap:wrap;margin-top:10px;font-size:0.78rem;}
.hl-legend.visible{display:flex;}
.hl-dot{display:flex;align-items:center;gap:5px;color:var(--text-dim);}
.hl-swatch{width:14px;height:14px;border-radius:3px;flex-shrink:0;}

/* QUESTION PANEL */
.question-panel{
  background:#fff;border:1.5px solid var(--border);border-radius:var(--radius);
  padding:20px;box-shadow:0 1px 4px rgba(0,0,0,0.07);
}
.q-progress{margin-bottom:16px;}
.q-progress-bar{height:7px;background:#e2e8f0;border-radius:4px;overflow:hidden;}
.q-progress-fill{height:100%;background:linear-gradient(90deg,var(--ocean-mid),var(--ocean-light));border-radius:4px;transition:width 0.4s ease;}
.q-progress-text{font-size:0.8rem;color:var(--text-dim);margin-top:5px;font-weight:700;}

.q-type-badge{
  display:inline-block;padding:3px 10px;border-radius:20px;
  font-size:0.72rem;font-weight:800;letter-spacing:0.5px;margin-bottom:10px;
}
.badge-comp{background:#e3f2fd;color:#1565a8;}
.badge-vocab{background:#fffde7;color:#f57f17;}
.badge-infer{background:#fff3e0;color:#e65100;}

.q-text{
  font-size:1rem;font-weight:700;line-height:1.6;
  color:var(--text);text-align:left;margin-bottom:4px;
}
.q-header{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:12px;}

/* CHOICES — TTS button is separate and CANNOT trigger answer selection */
.choices{display:flex;flex-direction:column;gap:9px;}
.choice-wrapper{position:relative;}
.choice{
  display:flex;align-items:flex-start;gap:10px;
  background:#f8fafc;border:2px solid var(--border);
  border-radius:10px;padding:10px 14px;
  transition:all 0.15s;font-weight:600;
  font-size:0.93rem;color:var(--text);text-align:left;
  line-height:1.5;
}
.choice.selectable{cursor:pointer;}
.choice.selectable:hover{border-color:var(--ocean-mid);background:#e3f2fd;}
.choice.correct{border-color:var(--correct);background:#e8f5e9;color:#1b5e20;}
.choice.wrong{border-color:var(--wrong);background:#ffebee;color:#7f0000;}
.choice-letter{
  width:26px;height:26px;border-radius:50%;
  background:#e2e8f0;display:flex;align-items:center;justify-content:center;
  font-size:0.8rem;font-weight:800;flex-shrink:0;margin-top:1px;
}
.choice.correct .choice-letter{background:var(--correct);color:#fff;}
.choice.wrong .choice-letter{background:var(--wrong);color:#fff;}
.choice-text{flex:1;}

/* TTS row below the choice text */
.choice-tts-row{padding:4px 14px 8px 50px;}

.feedback-msg{
  margin-top:12px;padding:10px 14px;border-radius:10px;
  font-weight:700;font-size:0.9rem;text-align:left;
}
.feedback-msg.correct{background:#e8f5e9;border:1.5px solid var(--correct);color:#1b5e20;}
.feedback-msg.wrong{background:#ffebee;border:1.5px solid var(--wrong);color:#7f0000;}

.q-nav{display:flex;justify-content:space-between;align-items:center;margin-top:16px;gap:10px;flex-wrap:wrap;}
.timer-display{font-family:'Bangers',cursive;font-size:1.2rem;color:var(--text-dim);letter-spacing:1px;}

/* TOP NAV BAR */
.top-nav{
  display:flex;align-items:center;gap:12px;margin-bottom:14px;
  flex-wrap:wrap;
}
.top-nav h2{font-family:'Bangers',cursive;font-size:1.4rem;color:var(--ocean-mid);letter-spacing:1px;flex:1;}

/* ---- SUMMARY ---- */
#summary-screen{max-width:760px;margin:0 auto;padding:20px 16px;}
.summary-card{
  background:#fff;border:1.5px solid var(--border);border-radius:var(--radius);
  padding:22px;margin-bottom:16px;box-shadow:0 1px 4px rgba(0,0,0,0.07);
}
.summary-title{font-family:'Bangers',cursive;font-size:1.8rem;letter-spacing:2px;color:var(--ocean-mid);margin-bottom:4px;}
.accuracy-ring{width:110px;height:110px;margin:0 auto 12px;}
.accuracy-pct{font-family:'Bangers',cursive;font-size:2.2rem;color:var(--ocean-mid);text-align:center;margin-bottom:4px;}
.summary-row{
  display:flex;justify-content:space-between;align-items:center;
  padding:8px 0;border-bottom:1px solid var(--border);font-size:0.93rem;
}
.summary-row:last-child{border-bottom:none;}
.summary-label{color:var(--text-dim);font-weight:700;}
.summary-val{font-weight:800;}
.summary-val.green{color:var(--correct);}
.summary-val.red{color:var(--wrong);}
.q-breakdown{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-top:14px;}
.qb-card{background:#f8fafc;border:1.5px solid var(--border);border-radius:10px;padding:12px;text-align:center;}
.qb-label{font-size:0.72rem;color:var(--text-dim);font-weight:800;margin-bottom:4px;}
.qb-score{font-family:'Bangers',cursive;font-size:1.5rem;}
.narrative-section{background:#f8fafc;border-radius:10px;padding:16px;margin-top:12px;border:1px solid var(--border);}
.narrative-section h3{color:var(--ocean-mid);font-size:0.88rem;font-weight:800;margin-bottom:8px;letter-spacing:0.3px;}
.narrative-section p{font-size:0.9rem;line-height:1.7;color:var(--text);}
.obs-list{list-style:none;padding:0;}
.obs-list li{padding:7px 0 7px 22px;position:relative;font-size:0.9rem;border-bottom:1px solid var(--border);line-height:1.6;}
.obs-list li:last-child{border-bottom:none;}
.obs-list li::before{content:'•';position:absolute;left:0;color:var(--ocean-mid);font-weight:900;}
.support-stats{display:flex;gap:10px;flex-wrap:wrap;margin-top:10px;}
.stat-pill{background:#e3f2fd;border:1px solid #b3d4f5;border-radius:20px;padding:6px 14px;font-size:0.83rem;font-weight:700;color:var(--text);}

@media print{
  .no-print{display:none!important;}
  body{background:#fff;color:#000;font-size:13px;}
  .summary-card{border:1px solid #ccc;box-shadow:none;page-break-inside:avoid;}
  #summary-screen{max-width:100%;padding:0;}
}
</style>
</head>
<body>

<!-- ===================== HOME SCREEN ===================== -->
<div id="home-screen" class="screen active">
  <div style="max-width:960px;margin:0 auto;padding:20px 16px;">
    <div class="home-header">
      <h1>🌿 Reading Adventures</h1>
      <p style="color:var(--text-dim)">Choose a passage to begin</p>
    </div>
    <div class="home-controls">
      <button class="btn btn-coral btn-sm" onclick="if(confirm('Reset all saved progress?')){resetProgress();}">🗑 Reset All Progress</button>
    </div>
    <div class="passages-grid" id="passages-grid"></div>
  </div>
</div>

<!-- ===================== READING SCREEN ===================== -->
<div id="reading-screen" class="screen">
  <div id="reading-inner" style="max-width:1020px;margin:0 auto;padding:14px 16px;">

    <!-- Top nav -->
    <div class="top-nav no-print">
      <button class="btn btn-ghost btn-sm" onclick="goHome()">← Home</button>
      <h2 id="reading-title-nav"></h2>
      <div class="timer-display" id="timer-display">0:00</div>
    </div>

    <!-- Per-passage settings bar -->
    <div class="passage-settings no-print">
      <label>
        🔤 Font:
        <select id="font-select" onchange="applyFont(this.value)">
          <option value="Lexend">Lexend ✓</option>
          <option value="'Atkinson Hyperlegible'">Atkinson Hyperlegible ✓</option>
          <option value="OpenDyslexic">OpenDyslexic ✓</option>
          <option value="Verdana">Verdana (system)</option>
          <option value="Arial">Arial (system)</option>
          <option value="Tahoma">Tahoma (system)</option>
          <option value="'Comic Sans MS'">Comic Sans (system)</option>
          <option value="sans-serif">Sans-serif (system)</option>
        </select>
      </label>
      <label>
        📏 Size:
        <select id="size-select" onchange="applySize(this.value)">
          <option value="13px">13px</option>
          <option value="14px">14px</option>
          <option value="15px" selected>15px</option>
          <option value="16px">16px</option>
          <option value="18px">18px</option>
          <option value="20px">20px</option>
        </select>
      </label>
      <label>
        ↕ Spacing:
        <button class="spacing-btn active" id="sp-15" onclick="applySpacing(1.7,'sp-15')">1.5×</button>
        <button class="spacing-btn" id="sp-20" onclick="applySpacing(2.2,'sp-20')">2×</button>
      </label>
      <label>
        🔊 Speed:
        <input type="range" id="speed-slider" min="0.5" max="1.4" step="0.05" value="0.85" oninput="updateSpeed(this.value)">
        <span class="speed-label" id="speed-label">0.85×</span>
      </label>
    </div>

    <!-- Two column layout -->
    <div class="reading-layout">

      <!-- PASSAGE PANEL -->
      <div class="passage-panel">
        <div class="passage-header">
          <div class="passage-num-badge" id="passage-num-label"></div>
          <div class="passage-title" id="passage-title-label"></div>
        </div>

        <!-- Audio controls -->
        <div class="passage-controls">
          <button class="tts-btn" id="read-all-btn" onclick="readFullPassage()">▶ Read Passage</button>
          <button class="tts-btn" id="pause-btn" onclick="pauseResumeSpeech()" style="display:none;border-color:#f57f17;color:#f57f17;">⏸ Pause</button>
          <button class="tts-btn" onclick="stopSpeech()" style="border-color:#c62828;color:#c62828;">■ Stop</button>
        </div>

        <div class="passage-body" id="passage-body"></div>

        <div class="hl-legend" id="hl-legend">
          <div class="hl-dot"><div class="hl-swatch" style="background:var(--hl-vocab)"></div> Vocabulary word</div>
          <div class="hl-dot"><div class="hl-swatch" style="background:var(--hl-comp)"></div> Comprehension clue</div>
          <div class="hl-dot"><div class="hl-swatch" style="background:var(--hl-infer)"></div> Inference clue</div>
        </div>
      </div>

      <!-- QUESTION PANEL -->
      <div class="question-panel">
        <div class="q-progress">
          <div class="q-progress-bar"><div class="q-progress-fill" id="q-progress-fill" style="width:0%"></div></div>
          <div class="q-progress-text" id="q-progress-text">Question 1 of 10</div>
        </div>
        <div id="question-area"></div>
      </div>

    </div><!-- end reading-layout -->
  </div>
</div>

<!-- ===================== SUMMARY SCREEN ===================== -->
<div id="summary-screen" class="screen">
  <div style="max-width:760px;margin:0 auto;padding:20px 16px;">
    <div class="top-nav no-print">
      <button class="btn btn-ghost btn-sm" onclick="goHome()">← Home</button>
      <h2>Session Summary</h2>
      <button class="btn btn-primary btn-sm no-print" onclick="window.print()">🖨 Print</button>
    </div>
    <div id="summary-content"></div>
  </div>
</div>

<script>
// ===================== PASSAGE DATA =====================
const ALL_PASSAGES = [
{
    id: 1, title: "The Trap-Door Spider", theme: "insect", emoji: "🕷️",
    text: "The trap-door spider is one of nature's most patient hunters. It spends weeks digging a burrow in the ground, lining it with silk, and building a hinged lid that blends perfectly with the surrounding soil. Then it waits — sometimes for hours, sometimes for days.\n\nWhen an insect walks past and vibrates the ground, the spider explodes out in a fraction of a second — faster than a blink. All that waiting leads to one perfect moment.\n\nThe spider doesn't get frustrated sitting in the dark. It just trusts the process. Scientists who study these spiders say some live in the same burrow for over twenty years, perfecting their craft.\n\nThere's something worth remembering here. Not everything rewards rushing. Some of the best things in life — friendships, skills, understanding — take time to grow. The trap-door spider knows that good things come to those who wait, prepare, and stay ready.",
    vocabWords: ["burrow", "vibrates", "perfecting"],
    compHL: ["It spends weeks digging a burrow in the ground, lining it with silk, and building a hinged lid that blends perfectly with the surrounding soil.", "scientists who study these spiders say some live in the same burrow for over twenty years, perfecting their craft.", "When an insect walks past and vibrates the ground, the spider explodes out in a fraction of a second"],
    inferHL: ["The spider doesn't get frustrated sitting in the dark. It just trusts the process.", "Not everything rewards rushing. Some of the best things in life — friendships, skills, understanding — take time to grow."],
    questions: [
      { type:"comp", q:"What does the trap-door spider build to hide its burrow?", choices:["A web made of leaves","A hinged lid made of silk and soil","A pile of sticks","A tunnel through rock"], answer:1, hlIdx:0 },
      { type:"comp", q:"How fast does the spider strike when prey walks past?", choices:["Within a few minutes","In about one second","In a fraction of a second","After several attempts"], answer:2, hlIdx:2 },
      { type:"comp", q:"How long can some trap-door spiders live in the same burrow?", choices:["One year","Five years","Over twenty years","Six months"], answer:2, hlIdx:1 },
      { type:"comp", q:"What does the spider do while waiting in its burrow?", choices:["Spins a new web each day","Stays ready and trusts the process","Hunts underground","Sleeps for weeks"], answer:1, hlIdx:1 },
      { type:"vocab", q:"What does 'burrow' mean in this passage?", choices:["A spider web","A hole dug in the ground as a home","A hunting method","A type of silk"], answer:1, vocabWord:"burrow" },
      { type:"vocab", q:"What does 'vibrates' mean when the insect walks past?", choices:["Makes a loud noise","Moves with a shaking motion","Disappears quickly","Leaves a scent"], answer:1, vocabWord:"vibrates" },
      { type:"vocab", q:"What does 'perfecting' mean here?", choices:["Starting something new","Giving something up","Making something as good as possible","Copying someone"], answer:2, vocabWord:"perfecting" },
      { type:"infer", q:"Why does the author say the spider 'doesn't get frustrated'?", choices:["Spiders have no feelings","To show patience is a strength","It only waits minutes","It never catches prey"], answer:1, hlIdx:0 },
      { type:"infer", q:"What life lesson does the spider's story teach?", choices:["Spiders are dangerous","Science is boring","Being patient and prepared leads to success","Waiting is always a waste"], answer:2, hlIdx:1 },
      { type:"infer", q:"Why does the author compare the spider's patience to building friendships?", choices:["Both involve digging","Good things in life also take time to develop","Friendships form fast","Spiders are social"], answer:1, hlIdx:1 }
    ]
  },
  {
    id: 2, title: "The Sperm Whale's Deep Dive", theme: "ocean", emoji: "🐋",
    text: "Sperm whales are the deepest diving animals with a backbone on Earth. They plunge over three kilometres beneath the ocean surface — deeper than most submarines can go — into near total darkness and crushing pressure.\n\nThey hunt giant squid using a remarkable ability called echolocation. They produce rapid clicking sounds that bounce off objects and return as echoes, painting a sound-picture of the dark world around them.\n\nWhat's extraordinary is that sperm whales cannot see in the deep dark. They go anyway. They use a completely different sense — sound — to navigate what their eyes cannot handle.\n\nSometimes in life you'll face situations where you can't clearly see what's ahead. New schools, difficult tasks, unfamiliar challenges. The sperm whale teaches us something important: you don't need perfect vision to move forward bravely. You just need a different way of finding your path.",
    vocabWords: ["echolocation", "navigate", "extraordinary"],

    text: "Leafcutter ants are farmers. They don't eat the leaves they carry — they use them to grow fungus, which is their actual food. Each ant in the colony has a job. Some cut leaves, some carry them, some guard the trail, and some tend the underground fungus gardens.\n\nThe colony can contain millions of ants, yet everything runs smoothly because each ant does its part without needing to be told.\n\nIf one group of ants fails, others adjust. If a trail is blocked, scouts find a new route within minutes. The colony is incredibly good at solving problems together.\n\nTeams work like this too — in sports, classrooms, and families. No single person can do everything alone. When everyone contributes their strength, even hard problems become manageable. And when something goes wrong, the best response isn't panic — it's quietly figuring out a new route forward.",

    text: "The mimic octopus is one of the ocean's greatest tricksters. Found in the tropical waters of Southeast Asia, it can change not just its colour, but its shape and behaviour — impersonating over fifteen different sea creatures.\n\nWhen threatened by a fish that fears lionfish, the mimic octopus flattens its arms and changes colour to look exactly like one. When faced by a different predator, it transforms into a flatfish gliding across the seafloor.\n\nThe mimic octopus doesn't have a shell or venom to protect it. Its only defence is its remarkable ability to adapt — to become something new depending on what the situation demands.\n\nAdapting isn't pretending to be someone you're not. It's being smart enough to respond differently to different situations. Knowing when to be bold and when to be quiet, when to try a different approach — that's a superpower in the real world too.",

    text: "On warm summer nights, fireflies turn meadows into living light shows. Each species of firefly has its own pattern of flashes — a private code used to find a mate. Some flash once every two seconds. Others create long glowing pulses. A few flash in perfect synchrony, entire trees blinking on and off together like a natural disco.\n\nThe light is created by a chemical reaction inside the firefly's abdomen — almost no heat is produced, making it one of the most efficient light sources in nature. Scientists have studied this reaction to improve LED technology and medical equipment.\n\nFireflies remind us that communication comes in many forms. Not everyone expresses themselves the same way — some people are quiet flashers, some are long and slow, some light up rooms with big energy. None of these is wrong. Each pattern has its place, and the right signal will always find the right receiver.",

    text: "Humans have three types of colour receptors in their eyes — enough to see millions of colours. The mantis shrimp has sixteen. Scientists used to assume this meant mantis shrimp could see more colours than any creature alive. They were surprised to discover the shrimp actually processes colour very differently — faster and more efficiently, rather than seeing more shades.\n\nThe mantis shrimp also has one of the most powerful punches in the animal kingdom. Its club-like claws strike with the speed of a bullet, creating a shockwave that can stun or kill prey even without direct contact.\n\nHere is a creature that sees the world completely differently to us, and strikes problems head on. It doesn't wait to be noticed. It has found its own extraordinary way of being in the world.\n\nYou don't have to experience things the same way as everyone else to be remarkable. Different ways of seeing and doing are often what the world needs most.",

    text: "Every year, monarch butterflies complete one of the most astonishing journeys in the natural world. They travel up to four thousand kilometres from Canada to Mexico — navigating using the sun, the Earth's magnetic field, and an internal clock that adjusts for the time of day.\n\nWhat makes this even more remarkable is that no single butterfly completes a round trip. The butterflies that arrive in Mexico are the great-grandchildren of those that left. The knowledge of where to go is somehow encoded in their biology — passed on without teaching.\n\nThink about that. These butterflies carry inherited wisdom they never had to be told. They know what to do even before they've done it.\n\nSome of what you know about yourself — your kindness, your curiosity, your strength — might also be something you were born with, something carried forward. Understanding yourself is partly about discovering what's already there.",

    text: "The pistol shrimp is tiny — usually less than five centimetres long. But it produces one of the loudest sounds in the ocean, louder than a gunshot, by snapping its claw so fast it creates a bubble of superheated plasma.\n\nFor a fraction of a second, that bubble reaches temperatures close to the surface of the sun. It collapses almost instantly, releasing a shockwave that stuns prey. The whole event is over faster than you can imagine.\n\nThis creature is so small you could hold it in your palm. Yet it creates something that briefly matches the temperature of a star.\n\nDon't judge something — or someone — by size alone. The smallest voices sometimes carry the most force. The quietest people in a room are sometimes the ones with the biggest ideas. Big things can come from unexpected places, and the world is full of surprises if you stay curious enough to notice them.",

    text: "Humpback whales sing some of the longest and most complex songs in the animal kingdom. A single song can last up to twenty minutes and be repeated for hours. All the male humpbacks in one ocean sing the same song — and the song evolves, changing slightly over months until it sounds completely different from where it began.\n\nThese songs travel thousands of kilometres through deep ocean channels, reaching whales on the other side of a vast sea. Scientists believe they are used to attract mates, but their full meaning is still not completely understood.\n\nThere is something quietly wonderful about the idea of a song spreading across an ocean — changing as it travels, touching others in ways the singer will never know.\n\nThe things you say and do have effects you might not always see. A kind word, a small act of help — like a whale song, they can travel further than you expect, and change things in ways you'll never fully know.",

    text: "The bombardier beetle has one of the most sophisticated defence systems in the insect world. When threatened, it mixes two chemicals stored in separate chambers inside its body. The reaction is so powerful it produces a boiling hot spray — nearly 100 degrees Celsius — that it fires from its rear end with a popping sound.\n\nThe beetle can aim this spray in almost any direction. It can fire up to twenty times before running out of chemicals, and the spray can deter predators as large as frogs and birds.\n\nWhat's fascinating is that the chemicals are harmless on their own. Only when they combine does the reaction happen. Many things in life are like that — one ingredient alone isn't enough. Skills, effort, and the right moment all coming together can create something remarkable.\n\nYou don't have to have everything figured out at once. Build your ingredients, one by one. When they come together, something powerful can happen.",

    text: "The blue whale is the largest animal ever known to have lived on Earth — bigger than any dinosaur. An adult blue whale can reach 30 metres in length and weigh as much as 200 tonnes. Its heart is the size of a small car, and its arteries are so wide a human could crawl through them.\n\nDespite its size, the blue whale feeds almost entirely on krill — tiny shrimp-like creatures less than six centimetres long. A blue whale eats up to four tonnes of krill each day.\n\nThe biggest creature on Earth survives by eating some of the smallest. Size isn't everything. Sometimes the things that sustain us and keep us going aren't the huge dramatic moments — they're the small, consistent things. Regular sleep, a good meal, a kind word from someone you trust. Small things, gathered in great enough numbers, make a great life.",

    text: "Termite mounds are engineering marvels. Some African termite mounds reach nine metres tall — taller than a two-storey house — and remain standing for decades. Inside, termites maintain a constant temperature of around 30 degrees Celsius, even when outside temperatures swing wildly from freezing nights to scorching days.\n\nThey do this with a network of tunnels that act like lungs — drawing cool air in from below and releasing hot air from the top. This design has inspired human architects who have copied the system to air-condition buildings without electricity.\n\nNot one termite designed this. No termite has a blueprint. The mound emerges from millions of small decisions made by individual insects responding to their environment.\n\nSometimes great things aren't planned from the start — they grow. Your understanding of yourself, your goals, your friendships — these don't need a perfect plan from day one. They build, organically, when you keep showing up and doing your part.",

    text: "Dolphins are among the most intelligent animals on Earth. They live in complex social groups, communicate using unique whistles that act like names, use tools — such as carrying sea sponges on their snouts to protect themselves while foraging on the seafloor — and even teach skills to their young.\n\nBut what sets dolphins apart is that they play. They surf waves for no reason other than fun. They blow bubble rings and pop them. Young dolphins spend hours inventing games. Scientists believe play is directly linked to intelligence — it's how creative minds develop.\n\nPlay isn't a waste of time. It's how you try things without the fear of failing. It's how you discover what you're good at and what makes you feel alive. The dolphins figured that out long before anyone told them to sit still and be serious.\n\nPlaying, exploring, and being curious aren't distractions from learning — they might be the most important kind of learning there is.",

    text: "Dragonflies have been flying for over 300 million years — long before the dinosaurs appeared. Ancient dragonflies were enormous, with wingspans up to 70 centimetres. The ones alive today are much smaller, but no less impressive.\n\nModern dragonflies are among the most accurate hunters on the planet. They intercept prey in mid-air with a 95% success rate — far higher than lions, sharks, or even humans with technology. They do this by predicting where their prey will be and flying to intercept it, rather than chasing it.\n\nThey've survived five mass extinctions, ice ages, and the complete reshaping of the planet, adapting each time.\n\nSome things endure not because they never change, but because they know how to adapt while keeping what works. You can be someone who handles change — not by becoming unrecognisable, but by holding onto your core self while adjusting to new situations.",

    id: 16, title: "The Narwhal's Mysterious Tusk", theme: "ocean", emoji: "🦄",
    text: "The narwhal is sometimes called the unicorn of the sea. Its spiral tusk — which can grow up to three metres long — is actually an overgrown tooth that grows through the upper lip. For centuries, people assumed it was used for fighting or breaking ice. Scientists now believe the tusk is packed with millions of nerve endings and is used to sense the environment — detecting changes in water temperature, pressure, and salt levels.\n\nThe narwhal uses its most unusual feature not as a weapon, but as a sensor — a way of feeling the world more deeply.\n\nOften the thing that makes you different is exactly what allows you to understand the world in a way others can't. What feels like a strange or awkward part of who you are might actually be a kind of sensitivity or awareness that other people don't have. Different isn't broken. Different is often exactly what's needed.",

// ===================== STATE =====================
let currentPassage = null;
let currentQ = 0;
let answers = [];
let readPassageCount = 0;
let wordTapCount = 0;
let timerInterval = null;
let elapsedSeconds = 0;
let speechRate = 0.85;
let currentFont = 'Lexend';
let currentFontSize = '15px';
let currentLineHeight = 1.7;
let currentSpacingId = 'sp-15';
let speechPaused = false;
let passageText = '';
let passageCharOffset = 0; // where we paused
let isSpeaking = false;
let currentUtterance = null;
let allWordSpans = [];

// ===================== LOCALSTORAGE =====================
function loadProgress() { try { return JSON.parse(localStorage.getItem('ra_progress2')||'{}'); } catch(e){return{};} }
function saveProgress(d) { try { localStorage.setItem('ra_progress2', JSON.stringify(d)); } catch(e){} }
function resetProgress() { localStorage.removeItem('ra_progress2'); renderHome(); }

// ===================== SETTINGS (per-passage) =====================
function applyFont(f) {
  currentFont = f;
  document.getElementById('passage-body').style.fontFamily = f;
  document.getElementById('question-area').style.fontFamily = f;
}
function applySize(s) {
  currentFontSize = s;
  document.getElementById('passage-body').style.fontSize = s;
  document.getElementById('question-area').style.fontSize = s;
}
function applySpacing(lh, btnId) {
  currentLineHeight = lh;
  document.getElementById('passage-body').style.lineHeight = lh;
  document.querySelectorAll('.spacing-btn').forEach(b => b.classList.remove('active'));
  document.getElementById(btnId).classList.add('active');
}
function updateSpeed(v) {
  speechRate = parseFloat(v);
  document.getElementById('speed-label').textContent = parseFloat(v).toFixed(2) + '×';
}

// ===================== HOME =====================
function renderHome() {
  const progress = loadProgress();
  const grid = document.getElementById('passages-grid');
  grid.innerHTML = '';
  ALL_PASSAGES.forEach(p => {
    const done = progress[p.id];
    const card = document.createElement('div');
    card.className = 'pcard' + (done ? ' done' : '');
    card.innerHTML =
      '<div class="pcard-num">#' + p.id + '</div>' +
      '<div class="pcard-emoji">' + p.emoji + '</div>' +
      '<div class="pcard-title">' + p.title + '</div>' +
      (done ? '<div class="pcard-score">' + done.correct + '/10 (' + done.pct + '%)</div>' : '');
    card.onclick = () => startPassage(p.id);
    grid.appendChild(card);
  });
}

function goHome() {
  stopSpeech();
  clearInterval(timerInterval);
  showScreen('home-screen');
  renderHome();
}

// ===================== START PASSAGE =====================
function startPassage(id) {
  currentPassage = ALL_PASSAGES.find(p => p.id === id);
  currentQ = 0;
  answers = new Array(currentPassage.questions.length).fill(null);
  readPassageCount = 0;
  wordTapCount = 0;
  elapsedSeconds = 0;
  speechPaused = false;
  isSpeaking = false;
  passageCharOffset = 0;

  document.getElementById('reading-title-nav').textContent = currentPassage.title;
  document.getElementById('passage-num-label').textContent = 'Passage #' + currentPassage.id;
  document.getElementById('passage-title-label').textContent = currentPassage.title;
  document.getElementById('hl-legend').classList.remove('visible');
  document.getElementById('pause-btn').style.display = 'none';

  // Reset per-passage settings UI to current values
  document.getElementById('font-select').value = currentFont;
  document.getElementById('size-select').value = currentFontSize;
  document.getElementById('speed-slider').value = speechRate;
  document.getElementById('speed-label').textContent = speechRate.toFixed(2) + '×';

  renderPassageBody();
  renderQuestion();
  startTimer();
  showScreen('reading-screen');

  // Apply current font/size to passage and questions
  setTimeout(() => {
    applyFont(currentFont);
    applySize(currentFontSize);
    applySpacing(currentLineHeight, currentSpacingId);
  }, 50);
}

// ===================== PASSAGE BODY =====================
function renderPassageBody() {
  const body = document.getElementById('passage-body');
  passageText = currentPassage.text;
  const paras = passageText.split('\n\n');
  allWordSpans = [];
  let charPos = 0;

  body.innerHTML = paras.map((para, pi) => {
    const tokens = para.split(/(\s+)/);
    const html = tokens.map(token => {
      const startChar = charPos;
      charPos += token.length;
      if (/^\s+$/.test(token)) return token;
      const escaped = token.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
      return '<span class="word" data-char="' + startChar + '" onclick="tapWord(this,event)">' + escaped + '</span>';
    }).join('');
    charPos += 2; // for \n\n
    return '<p>' + html + '</p>';
  }).join('');

  allWordSpans = Array.from(body.querySelectorAll('.word'));
}

function tapWord(el, e) {
  e.stopPropagation();
  const word = el.textContent.replace(/[^a-zA-Z''\-]/g, '');
  if (!word) return;
  wordTapCount++;
  // Don't cancel the passage reading — just speak the word separately
  const u = new SpeechSynthesisUtterance(word);
  u.rate = Math.min(speechRate * 0.9, 1.0);
  u.pitch = 0.88;
  setVoice(u);
  // Interrupt any word-level TTS but not passage reading
  if (!isSpeaking) {
    window.speechSynthesis.cancel();
    window.speechSynthesis.speak(u);
  } else {
    // Queue after current word boundary — just speak it
    window.speechSynthesis.speak(u);
  }
}

// ===================== TTS — PASSAGE =====================
function readFullPassage() {
  stopSpeech();
  readPassageCount++;
  passageCharOffset = 0;
  speakFrom(0);
}

function speakFrom(charOffset) {
  const textToSpeak = currentPassage.text.replace(/\n\n/g, ' ').substring(charOffset);
  if (!textToSpeak.trim()) return;

  const u = new SpeechSynthesisUtterance(textToSpeak);
  u.rate = speechRate;
  u.pitch = 0.88;
  u.volume = 1;
  setVoice(u);
  currentUtterance = u;
  isSpeaking = true;
  speechPaused = false;

  const btn = document.getElementById('read-all-btn');
  const pauseBtn = document.getElementById('pause-btn');
  if (btn) btn.classList.add('speaking');
  if (pauseBtn) { pauseBtn.style.display = 'inline-flex'; pauseBtn.textContent = '⏸ Pause'; }

  u.onboundary = (e) => {
    if (e.name !== 'word') return;
    passageCharOffset = charOffset + e.charIndex;
    // Highlight word in passage
    clearReadingHighlight();
    // Find span whose data-char is closest to charOffset + e.charIndex
    const target = charOffset + e.charIndex;
    let best = null, bestDiff = Infinity;
    allWordSpans.forEach(sp => {
      const sc = parseInt(sp.dataset.char || '0');
      const diff = Math.abs(sc - target);
      if (diff < bestDiff) { bestDiff = diff; best = sp; }
    });
    if (best && bestDiff < 15) best.classList.add('reading-hl');
  };

  u.onend = () => {
    clearReadingHighlight();
    isSpeaking = false;
    if (btn) btn.classList.remove('speaking');
    if (pauseBtn) pauseBtn.style.display = 'none';
    currentUtterance = null;
  };

  u.onerror = () => {
    isSpeaking = false;
    if (btn) btn.classList.remove('speaking');
    if (pauseBtn) pauseBtn.style.display = 'none';
  };

  window.speechSynthesis.speak(u);
}

function pauseResumeSpeech() {
  const pauseBtn = document.getElementById('pause-btn');
  if (!isSpeaking && !speechPaused) return;

  if (!speechPaused) {
    // Pause
    window.speechSynthesis.pause();
    speechPaused = true;
    if (pauseBtn) pauseBtn.textContent = '▶ Resume';
  } else {
    // Resume
    window.speechSynthesis.resume();
    speechPaused = false;
    if (pauseBtn) pauseBtn.textContent = '⏸ Pause';
  }
}

function stopSpeech() {
  window.speechSynthesis.cancel();
  isSpeaking = false;
  speechPaused = false;
  currentUtterance = null;
  clearReadingHighlight();
  const btn = document.getElementById('read-all-btn');
  const pauseBtn = document.getElementById('pause-btn');
  if (btn) btn.classList.remove('speaking');
  if (pauseBtn) pauseBtn.style.display = 'none';
}

function clearReadingHighlight() {
  allWordSpans.forEach(s => s.classList.remove('reading-hl'));
}

function speakText(text) {
  // For questions/choices — doesn't affect passage reading
  const u = new SpeechSynthesisUtterance(text);
  u.rate = speechRate;
  u.pitch = 0.88;
  u.volume = 1;
  setVoice(u);
  if (!isSpeaking) {
    window.speechSynthesis.cancel();
    window.speechSynthesis.speak(u);
  } else {
    window.speechSynthesis.speak(u);
  }
}

function setVoice(u) {
  const voices = window.speechSynthesis.getVoices();
  const preferred = ['Aaron','Daniel','Fred','Alex','Tom','Oliver','George','Chris','James','Nathan'];
  let v = voices.find(v2 => preferred.some(n => v2.name.includes(n)) && v2.lang.startsWith('en'));
  if (!v) v = voices.find(v2 => v2.lang.startsWith('en-') && !v2.name.toLowerCase().includes('female') && !v2.name.toLowerCase().includes('woman'));
  if (!v) v = voices.find(v2 => v2.lang.startsWith('en'));
  if (v) u.voice = v;
}

// ===================== QUESTIONS =====================
// Store current question texts so TTS buttons can reference by index (avoids quote-escaping bugs)
let _qTexts = [];

function renderQuestion() {
  const q = currentPassage.questions[currentQ];
  const total = currentPassage.questions.length;
  const pct = (currentQ / total) * 100;
  document.getElementById('q-progress-fill').style.width = pct + '%';
  document.getElementById('q-progress-text').textContent = 'Question ' + (currentQ+1) + ' of ' + total;

  const typeLabels = {comp:'Comprehension',vocab:'Vocabulary',infer:'Inference'};
  const typeClass = {comp:'badge-comp',vocab:'badge-vocab',infer:'badge-infer'};
  const answered = answers[currentQ];

  // Store texts in array so onclick can reference by index — avoids quote conflicts in HTML attributes
  _qTexts = [q.q, ...q.choices];
  // _qTexts[0] = question, _qTexts[1..4] = choices A-D

  let choicesHTML = '';
  q.choices.forEach((c, i) => {
    let cls = '';
    let isSelectable = true;
    if (answered !== null) {
      if (i === q.answer) cls = ' correct';
      else if (i === answered && answered !== q.answer) cls = ' wrong';
      isSelectable = false;
    }
    const letters = ['A','B','C','D'];
    choicesHTML +=
      '<div class="choice-wrapper">' +
        '<div class="choice' + cls + (isSelectable ? ' selectable' : '') + '" id="choice-' + i + '"' +
          (isSelectable ? ' onclick="selectAnswer(' + i + ')"' : '') + '>' +
          '<span class="choice-letter">' + letters[i] + '</span>' +
          '<span class="choice-text">' + escHtml(c) + '</span>' +
        '</div>' +
        '<div class="choice-tts-row">' +
          '<button class="tts-btn" onclick="event.stopPropagation();speakQText(' + (i+1) + ')">🔊 Listen</button>' +
        '</div>' +
      '</div>';
  });

  const feedbackHTML = answered !== null
    ? '<div class="feedback-msg ' + (answered===q.answer?'correct':'wrong') + '">' +
        (answered===q.answer ? '✅ Correct!' : '❌ Not quite — see the correct answer highlighted above.') +
      '</div>'
    : '';

  const navHTML =
    '<div class="q-nav">' +
      (currentQ > 0 ? '<button class="btn btn-ghost btn-sm" onclick="prevQ()">← Back</button>' : '<span></span>') +
      (answered !== null && currentQ < total-1 ? '<button class="btn btn-primary btn-sm" onclick="nextQ()">Next →</button>' : '') +
      (answered !== null && currentQ === total-1 ? '<button class="btn btn-leaf btn-sm" onclick="showSummary()">✅ Finish</button>' : '') +
    '</div>';

  document.getElementById('question-area').innerHTML =
    '<div class="q-type-badge ' + typeClass[q.type] + '">' + typeLabels[q.type] + '</div>' +
    '<div class="q-header">' +
      '<div class="q-text">' + escHtml(q.q) + '</div>' +
      '<button class="tts-btn" onclick="speakQText(0)">🔊 Listen</button>' +
    '</div>' +
    '<div class="choices">' + choicesHTML + '</div>' +
    feedbackHTML +
    navHTML;

  // Re-apply font/size to question area
  applyFont(currentFont);
  applySize(currentFontSize);
}

// Safe TTS for questions/choices — reads from _qTexts array, no quote issues
function speakQText(idx) {
  const text = _qTexts[idx];
  if (!text) return;
  speakText(text);
}

function escHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function selectAnswer(choiceIdx) {
  const q = currentPassage.questions[currentQ];
  // If already answered correctly, don't allow change
  if (answers[currentQ] === q.answer) return;
  answers[currentQ] = choiceIdx;

  clearPassageHighlights();
  if (choiceIdx !== q.answer) {
    applyPassageHighlight(q);
    document.getElementById('hl-legend').classList.add('visible');
  } else {
    document.getElementById('hl-legend').classList.remove('visible');
  }
  renderQuestion();
}

function clearPassageHighlights() {
  allWordSpans.forEach(el => el.classList.remove('hl-vocab','hl-comp','hl-infer'));
}

function applyPassageHighlight(q) {
  const type = q.type;
  const hlClass = type==='vocab' ? 'hl-vocab' : type==='comp' ? 'hl-comp' : 'hl-infer';

  if (type === 'vocab' && q.vocabWord) {
    highlightWordInPassage(q.vocabWord, hlClass);
  } else if (q.hlIdx !== undefined) {
    const arr = type==='comp' ? currentPassage.compHL : currentPassage.inferHL;
    if (arr && arr[q.hlIdx]) highlightPhraseInPassage(arr[q.hlIdx], hlClass);
  }
}

function highlightWordInPassage(word, cls) {
  const clean = word.toLowerCase().replace(/[^a-z'\-]/g,'');
  allWordSpans.forEach(el => {
    const w = el.textContent.toLowerCase().replace(/[^a-z'\-]/g,'');
    if (w === clean) el.classList.add(cls);
  });
}

function highlightPhraseInPassage(phrase, cls) {
  const phraseWords = phrase.toLowerCase().replace(/[^a-z\s'\-]/g,'').split(/\s+/).filter(Boolean);
  const spanWords = allWordSpans.map(s => s.textContent.toLowerCase().replace(/[^a-z'\-]/g,''));

  for (let i = 0; i <= spanWords.length - phraseWords.length; i++) {
    let match = true;
    for (let j = 0; j < phraseWords.length; j++) {
      if (spanWords[i+j] !== phraseWords[j]) { match=false; break; }
    }
    if (match) {
      for (let j = 0; j < phraseWords.length; j++) allWordSpans[i+j].classList.add(cls);
      return;
    }
  }
  // Fuzzy: match first 3 words
  const first3 = phraseWords.slice(0,3);
  for (let i = 0; i <= spanWords.length-3; i++) {
    if (spanWords[i]===first3[0] && spanWords[i+1]===first3[1]) {
      for (let j=0; j<Math.min(phraseWords.length, allWordSpans.length-i); j++) allWordSpans[i+j].classList.add(cls);
      return;
    }
  }
}

function nextQ() { currentQ++; clearPassageHighlights(); document.getElementById('hl-legend').classList.remove('visible'); renderQuestion(); }
function prevQ() { currentQ--; clearPassageHighlights(); document.getElementById('hl-legend').classList.remove('visible'); renderQuestion(); }

// ===================== TIMER =====================
function startTimer() {
  clearInterval(timerInterval);
  elapsedSeconds = 0;
  timerInterval = setInterval(() => {
    elapsedSeconds++;
    const m = Math.floor(elapsedSeconds/60);
    const s = elapsedSeconds%60;
    const el = document.getElementById('timer-display');
    if (el) el.textContent = m + ':' + s.toString().padStart(2,'0');
  }, 1000);
}

// ===================== SUMMARY =====================
function showSummary() {
  stopSpeech();
  clearInterval(timerInterval);

  const qs = currentPassage.questions;
  let correct=0, compC=0,compT=0, vocabC=0,vocabT=0, inferC=0,inferT=0;
  qs.forEach((q,i) => {
    const ok = answers[i]===q.answer;
    if(ok) correct++;
    if(q.type==='comp'){compT++;if(ok)compC++;}
    if(q.type==='vocab'){vocabT++;if(ok)vocabC++;}
    if(q.type==='infer'){inferT++;if(ok)inferC++;}
  });

  const pct = Math.round((correct/qs.length)*100);
  const m = Math.floor(elapsedSeconds/60), s = elapsedSeconds%60;
  const timeStr = m + ':' + s.toString().padStart(2,'0');
  const speedLabel = document.getElementById('speed-label').textContent;
  const fontLabel = document.getElementById('font-select').options[document.getElementById('font-select').selectedIndex].text;
  const sizeLabel = currentFontSize;
  const spacingLabel = currentLineHeight >= 2 ? '2× (double)' : '1.5×';

  const progress = loadProgress();
  progress[currentPassage.id] = {correct, pct};
  saveProgress(progress);

  const observations = generateObservations(correct,pct,compC,compT,vocabC,vocabT,inferC,inferT,readPassageCount,wordTapCount);

  const circ = 2*Math.PI*45;
  const dash = (pct/100)*circ;
  const ringColor = pct>=80 ? '#2e7d32' : pct>=60 ? '#f9a825' : '#c62828';

  document.getElementById('summary-content').innerHTML =
    '<div class="summary-card">' +
      '<div class="summary-title">📊 ' + currentPassage.emoji + ' Passage #' + currentPassage.id + '</div>' +
      '<p style="color:var(--text-dim);font-size:0.85rem;margin-bottom:16px">' + currentPassage.title + '</p>' +
      '<svg class="accuracy-ring" viewBox="0 0 100 100">' +
        '<circle cx="50" cy="50" r="45" fill="none" stroke="#e2e8f0" stroke-width="10"/>' +
        '<circle cx="50" cy="50" r="45" fill="none" stroke="' + ringColor + '" stroke-width="10" ' +
          'stroke-dasharray="' + dash.toFixed(1) + ' ' + circ.toFixed(1) + '" stroke-linecap="round" ' +
          'style="transform:rotate(-90deg);transform-origin:50% 50%"/>' +
      '</svg>' +
      '<div class="accuracy-pct">' + pct + '%</div>' +
      '<div class="summary-row"><span class="summary-label">Total Score</span><span class="summary-val">' + correct + ' / ' + qs.length + '</span></div>' +
      '<div class="summary-row"><span class="summary-label">✅ Correct</span><span class="summary-val green">' + correct + '</span></div>' +
      '<div class="summary-row"><span class="summary-label">❌ Incorrect</span><span class="summary-val red">' + (qs.length-correct) + '</span></div>' +
      '<div class="summary-row"><span class="summary-label">⏱ Time Taken</span><span class="summary-val">' + timeStr + '</span></div>' +
      '<div class="q-breakdown">' +
        '<div class="qb-card"><div class="qb-label">Comprehension</div><div class="qb-score" style="color:#1565a8">' + compC + '/' + compT + '</div></div>' +
        '<div class="qb-card"><div class="qb-label">Vocabulary</div><div class="qb-score" style="color:#f57f17">' + vocabC + '/' + vocabT + '</div></div>' +
        '<div class="qb-card"><div class="qb-label">Inference</div><div class="qb-score" style="color:#e65100">' + inferC + '/' + inferT + '</div></div>' +
      '</div>' +
    '</div>' +

    '<div class="summary-card">' +
      '<div class="summary-title" style="font-size:1.3rem">🖥 Accessibility Settings Used</div>' +
      '<div class="support-stats">' +
        '<div class="stat-pill">🔤 Font: <strong>' + fontLabel + '</strong></div>' +
        '<div class="stat-pill">📏 Size: <strong>' + sizeLabel + '</strong></div>' +
        '<div class="stat-pill">↕ Spacing: <strong>' + spacingLabel + '</strong></div>' +
        '<div class="stat-pill">🔊 Speed: <strong>' + speedLabel + '</strong></div>' +
      '</div>' +
    '</div>' +

    '<div class="summary-card">' +
      '<div class="summary-title" style="font-size:1.3rem">📖 Reading Support Used</div>' +
      '<div class="support-stats">' +
        '<div class="stat-pill">📖 Passage read aloud: <strong>' + readPassageCount + '×</strong></div>' +
        '<div class="stat-pill">🔤 Words tapped: <strong>' + wordTapCount + '</strong></div>' +
      '</div>' +
      '<p style="margin-top:10px;font-size:0.85rem;color:var(--text-dim)">' +
        (readPassageCount===0 && wordTapCount===0
          ? 'No audio reading support was used this session.'
          : (readPassageCount>0 ? 'The full passage was played ' + readPassageCount + ' time' + (readPassageCount>1?'s':'') + '. ' : '') +
            (wordTapCount>0 ? wordTapCount + ' individual word' + (wordTapCount>1?' taps were':' tap was') + ' used for pronunciation support.' : '')) +
      '</p>' +
    '</div>' +

    '<div class="summary-card">' +
      '<div class="summary-title" style="font-size:1.3rem">📝 Notes</div>' +
      observations.sections.map(sec =>
        '<div class="narrative-section">' +
          '<h3>' + sec.heading + '</h3>' +
          (sec.list
            ? '<ul class="obs-list">' + sec.list.map(item => '<li>' + item + '</li>').join('') + '</ul>'
            : '<p>' + sec.text + '</p>') +
        '</div>'
      ).join('') +
    '</div>' +

    '<div class="no-print" style="display:flex;gap:12px;flex-wrap:wrap;margin-top:4px;">' +
      '<button class="btn btn-primary" onclick="goHome()">← Back to Passages</button>' +
      '<button class="btn btn-sand" onclick="window.print()">🖨 Print Summary</button>' +
      (currentPassage.id < 20 ? '<button class="btn btn-leaf" onclick="startPassage(' + (currentPassage.id+1) + ')">Next Passage →</button>' : '') +
    '</div>';

  showScreen('summary-screen');
}

function generateObservations(correct,pct,compC,compT,vocabC,vocabT,inferC,inferT,readCount,tapCount) {
  const overall = [];
  const compObs = [];
  const vocabObs = [];
  const inferObs = [];

  // Overall
  overall.push('Overall score: ' + correct + '/10 (' + pct + '%).');
  if (pct >= 80) overall.push('Performance was in the strong range (80%+).');
  else if (pct >= 60) overall.push('Performance was in the moderate range (60–79%).');
  else overall.push('Performance was in the developing range (below 60%). More practice or scaffolding may be helpful.');

  // Comprehension
  compObs.push('Comprehension: ' + compC + '/' + compT + ' (' + Math.round(compC/compT*100) + '%).');
  if (compC === compT) compObs.push('All literal comprehension questions answered correctly.');
  else if (compC >= 3) compObs.push('Most literal comprehension questions answered correctly.');
  else compObs.push('Difficulty locating specific information directly stated in the text.');

  // Vocab
  vocabObs.push('Vocabulary: ' + vocabC + '/' + vocabT + ' (' + Math.round(vocabC/vocabT*100) + '%).');
  if (vocabC === vocabT) vocabObs.push('All vocabulary-in-context questions answered correctly.');
  else if (vocabC >= 2) vocabObs.push('Most vocabulary questions answered correctly.');
  else vocabObs.push('Difficulty using context to determine word meaning. Pre-teaching key words before reading may help.');

  // Inference
  inferObs.push('Inference: ' + inferC + '/' + inferT + ' (' + Math.round(inferC/inferT*100) + '%).');
  if (inferC === inferT) inferObs.push('All inference questions answered correctly — able to read beyond what is directly stated.');
  else if (inferC >= 2) inferObs.push('Most inference questions answered correctly.');
  else inferObs.push('Difficulty with questions requiring reasoning beyond the text. This is a developing skill for many readers.');

  // Support
  const supportObs = [];
  supportObs.push('Passage read aloud ' + readCount + ' time' + (readCount!==1?'s':'') + '.');
  supportObs.push(tapCount + ' word' + (tapCount!==1?'s':'') + ' tapped for audio support.');
  if (readCount > 1) supportObs.push('Repeated use of "Read Passage" noted — text access via audio was important this session.');
  if (tapCount > 10) supportObs.push('High word-tap count may indicate decoding difficulty with unfamiliar vocabulary.');
  if (readCount === 0 && tapCount === 0) supportObs.push('No audio support used — student attempted all reading independently.');

  return {
    sections: [
      { heading: '📊 Overall Performance', list: overall },
      { heading: '📖 Comprehension', list: compObs },
      { heading: '🔤 Vocabulary', list: vocabObs },
      { heading: '🔍 Inference', list: inferObs },
      { heading: '🔊 Reading Support', list: supportObs },
    ]
  };
}

// ===================== SCREEN MGMT =====================
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0,0);
}

// ===================== INIT =====================
window.speechSynthesis.onvoiceschanged = () => {};
renderHome();
